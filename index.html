<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clickster</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body class="flex flex-col h-screen">
  <header class="bg-pink-300 text-white italic text-5xl font-serif text-center">
    Cupcake clicker
  </header>


  <main class="flex flex-1">
    <div class="flex-1 bg-purple-300 flex flex-col text-4xl font-serif items-center text-white italic">
      <p id="scoreDisplay">Score</p>
      <button id="clicker">
        <img class="w-md" src="/src/assets/Adobe Express - file.png"  alt="Cupcake clicker" class="w-1/2">

      </button>
    </div>

    <div class="flex-1/6 flex flex-col bg-blue-300 text-white font-serif italic text-4xl items-center">
    <P>Store </P>
      <br>
      <button id="upgradeOne" class=" bg-pink-100 items-center flex flex-col transition-all text-pink-white" >
        <p class="text-2xl bg-pink-100 text-purple-300">Upgrade #1:</p>
        <img class="w-55" src="Kay_cupcake.webp" alt="rare cupcake">
        <p id="upgradeOneCount" class="bg-pink-100 text-purple-300"> Rare Rainbow Cupcake
        <p class="bg-pink-100 text-purple-300 text-xl">cost:100 </p>
      </button>
      <br>
      <button id="upgradeTwo" class=" bg-pink-100 items-center flex flex-col transition-all text-pink-white" >
        <p class="text-2xl bg-pink-100 text-purple-300">Upgrade #2:</p>
        <img class="w-45" src="Cupcake_queen_art_better.webp" alt="Ultra rare cupcake">
        <p id="upgradetwoCount" class="bg-pink-100 text-purple-300"> Ultra <br> Rare Rainbow cupcakes
        <p class="bg-pink-100 text-purple-300 text-xl">cost:500</p>
        
      </button>
    </div>

  </main>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
